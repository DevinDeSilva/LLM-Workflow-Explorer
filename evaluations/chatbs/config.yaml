file_paths:
  schema_loc: "schema/schemaV2.json"
  execution_kg_loc: "usecases/chatbs/data/10_sample_graph/chatbs_sample.ttl"
  metadata_loc: "usecases/chatbs/data/10_sample_graph/chatbs_sample_metadata.json"

explorer_config:
  kg_name: "ChatBS-NexGen"
  ontology_triples_path: "schema/extracted_ontology_triples.csv"
  parallel: True
  temp_folder: "evaluations/chatbs/exeprog_creation/tmp/programs"
  use_cache: False
  explorer_metadata_loc: "evaluations/chatbs/exeprog_creation/exeplorer_metadata.pkl"
  exeprog_save_loc: "evaluations/chatbs/exeprog_creation/exeplored_programs.pkl"

question_creation_config:
  save_questions: "evaluations/chatbs/ques_creation/SyntheticQuestionKG.csv"
  llm_type: "lmstudio"
  model: "openai/llama-3.3-70b-instruct"
  llm_config:
    api_base: "http://169.254.217.32:1234/v1"

ttl: 
  prefixes: [
    { name: "provone", uri: "http://purl.dataone.org/provone/2015/01/15/ontology#" },
    { name: "skos", uri: "http://www.w3.org/2004/02/skos/core#" },
    { name: "prov", uri: "http://www.w3.org/ns/prov#" },
    { name: "rdfs", uri: "http://www.w3.org/2000/01/rdf-schema#" },
    { name: "cwfo", uri: "http://cwf.tw.rpi.edu/vocab#" },
    { name: "dcterms", uri: "http://purl.org/dc/terms#" },
    { name: "ChatBS-NexGen", uri: "http://testwebsite/testProgram#" },
    { name: "user", uri: "http://testwebsite/testUser#" },
    { name: "eo", uri: "https://purl.org/heals/eo#" },
    { name: "ep", uri: "http://linkedu.eu/dedalo/explanationPattern.owl#" },
    { name: "sio", uri: "http://semanticscience.org/resource/" },
    { name: "dc", uri: "http://purl.org/dc/elements/1.1/" },
    { name: "DFColumn", uri: "http://testwebsite/testDFColumn#" },
    { name: "fnom", uri: "https://w3id.org/function/vocabulary/mapping#" },
    { name: "fnoi", uri: "https://w3id.org/function/vocabulary/implementation#" },
    { name: "fnoc", uri: "https://w3id.org/function/vocabulary/composition/0.1.0/" },
    { name: "food", uri: "http://purl.org/heals/food/" },
