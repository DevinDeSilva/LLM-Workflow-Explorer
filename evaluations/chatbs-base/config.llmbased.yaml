application:
  description: The application that utilizes a functional approach to support unittesting of LLMs on user designed prompts. 
               This application contains functions generated by LLMs and functions that utilizes LLM generated output within 
               the system. In this experiments are represented as provone:Executions of provone:Programs (a step of the experiment 
               pipeline) while some of these provone:Programs are generated by LLM as Generative_Tasks. dc:identifier represents
               the unique experiment id.       

file_paths:
  schema_loc: "schema/schemaV2.json"
  execution_kg_loc: "usecases/chatbs/data/1_sample_graph/chatbs_sample.ttl"
  metadata_loc: "usecases/chatbs/data/1_sample_graph/chatbs_sample_metadata.json"
  ontology_path: "schema/WorkFlow.ttl"

explainer_config:
  llm_type: "lmstudio"
  embedding_type: "lmstudio"
  vectordb_type: "milvus"
  save_answer_loc: "evaluations/chatbs-base/explainer/llmbased"

  llm_config:
    model: "lm_studio/qwen/qwen3.5-4b"
    base_url: "http://localhost:1234/v1"
  log_file: "evaluations/chatbs-base/explainer/explainer_llmbased_log.txt"

gt:
  log_file: "evaluations/chatbs-base/ground_truth/ground_truth_log.txt"
  save_loc: "evaluations/chatbs-base/ground_truth/ground_truth_data.json"

